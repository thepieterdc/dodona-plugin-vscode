name: NodeJS

on:
  pull_request:
    branches:
      - master

  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          cache: 'yarn'
          node-version-file: .node-version
      - run: corepack enable
      - run: corepack prepare yarn@4.7.0 --activate
      - run: yarn install --immutable
      - run: yarn build
      - run: yarn package
      - uses: actions/upload-artifact@v4
        with:
          path: |
            *.vsix

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          cache: 'yarn'
          node-version-file: .node-version
      - run: corepack enable
      - run: corepack prepare yarn@4.7.0 --activate
      - run: yarn install --immutable
      - run: yarn lint
